name: Build dp_scroll.dylib
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build iOS dylib (arm64 + arm64e)
        run: |
          SDK=$(xcrun -sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos clang \
            -arch arm64 \
            -arch arm64e \
            -miphoneos-version-min=14.0 \
            -isysroot "$SDK" \
            -framework UIKit \
            -framework Foundation \
            -framework Security \
            -shared \
            -Wl,-install_name,@executable_path/Frameworks/dp_scroll.dylib \
            -o dp_scroll.dylib \
            dp_scroll.m
          file dp_scroll.dylib
          ls -lh dp_scroll.dylib
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dp_scroll_dylib
          path: dp_scroll.dylib
          retention-days: 7
