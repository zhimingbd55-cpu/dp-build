      - name: Build iOS dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun --sdk iphoneos clang \
            -arch arm64 -arch arm64e \
            -miphoneos-version-min=14.0 \
            -isysroot "$SDK" \
            -fmodules \
            -framework UIKit -framework Foundation -framework Security \
            -Wno-deprecated-declarations \
            -dynamiclib \
            -Wl,-install_name,@executable_path/Frameworks/dp_scroll.dylib \
            -o dp_scroll.dylib dp_scroll.m
          file dp_scroll.dylib && ls -lh dp_scroll.dylib
